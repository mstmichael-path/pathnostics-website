<head>

<title>Pathnostics — Yes. It's a crisis.</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
  :root {
    --path-purple:        #39378F;
    --path-purple-deep:   #2A2873;
    --path-coral-bright:  #E82065;
    --path-coral:         #B8004B;
    --path-sky:           #8FCAEB;
    --path-green:         #00AE81;
    --path-lime:          #B6CD2F;
    --gradient-signature: linear-gradient(90deg, #39378F 0%, #E82065 33%, #00AE81 66%, #B6CD2F 100%);

    --font-display: "Newsreader", Georgia, "Times New Roman", serif;
    --font-body:    "Be Vietnam Pro", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  html { background: var(--path-purple-deep); }
  body {
    min-height: 100vh;
    background: var(--path-purple);
    color: #fff;
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
    position: relative;
  }

  /* ─── BACKGROUND: liquid ink in water ───────────────────── */
  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    background:
      radial-gradient(ellipse 90% 60% at 50% 100%, rgba(42,40,115,0.6) 0%, transparent 70%),
      var(--path-purple);
  }
  .bg-blobs {
    position: absolute;
    inset: -10%;
  }
  /* Plain blurred radial gradients — same approach as the whitepaper
     cover. No SVG displacement filter; the displacement was carving
     visible iso-opacity rings out of any gradient it touched. */
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.95;
  }
  .blob.b1 {
    width: 70vmax; height: 70vmax;
    top: -26vmax; right: -22vmax;
    /* Extra interpolation anchors prevent the 8-bit alpha banding
       this blob's higher-contrast falloff would otherwise produce. */
    background: radial-gradient(circle,
      rgba(232,32,101,0.48) 0%,
      rgba(232,32,101,0.34) 20%,
      rgba(232,32,101,0.20) 40%,
      rgba(232,32,101,0.09) 58%,
      rgba(232,32,101,0.03) 75%,
      rgba(232,32,101,0)    100%);
  }
  .blob.b2 {
    width: 80vmax; height: 80vmax;
    bottom: -32vmax; left: -26vmax;
    background: radial-gradient(circle, rgba(143,202,235,0.32) 0%, rgba(143,202,235,0) 65%);
  }
  .blob.b3 {
    width: 58vmax; height: 58vmax;
    top: 22%; left: -14vmax;
    background: radial-gradient(circle, rgba(184,0,75,0.45) 0%, rgba(184,0,75,0) 65%);
    mix-blend-mode: screen;
  }

  /* Subtle grain overlay */
  .bg-grain {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0.06;
    mix-blend-mode: overlay;
    background-image:
      radial-gradient(rgba(255,255,255,0.7) 0.5px, transparent 0.5px),
      radial-gradient(rgba(0,0,0,0.5) 0.3px, transparent 0.3px);
    background-size: 3px 3px, 5px 5px;
    background-position: 0 0, 1.5px 1.5px;
  }

  /* Top signature bar */
  .signature-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--gradient-signature);
    z-index: 10;
  }

  /* ─── LAYOUT ────────────────────────────────────────────── */
  .frame {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    min-height: 100svh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: clamp(28px, 4vw, 56px) clamp(24px, 5vw, 80px);
    gap: clamp(32px, 5vh, 64px);
  }

  /* Header */
  .topbar {
    display: flex;
    align-items: center;
  }
  .logo {
    height: clamp(28px, 2.4vw, 38px);
    width: auto;
    display: block;
  }

  /* Center stage */
  .stage {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    max-width: 1280px;
    width: 100%;
    margin: 0 auto;
  }
  .h1 {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: clamp(56px, 11vw, 168px);
    line-height: 0.96;
    letter-spacing: -0.035em;
    color: #fff;
    margin: 0;
    max-width: 14ch;
  }
  .h1 .reveal-line {
    display: block;
  }
  .h1 .crisis {
    font-style: italic;
    font-weight: 400;
  }
  .h1 .period {
    color: var(--path-coral-bright);
    font-style: normal;
  }

  .h2 {
    position: relative;
    font-family: var(--font-display);
    font-style: italic;
    font-weight: 400;
    font-size: clamp(20px, 2.4vw, 34px);
    line-height: 1.35;
    color: rgba(255,255,255,0.75);
    margin: clamp(28px, 3.4vh, 44px) 0 0 0;
    padding-top: clamp(20px, 2.6vh, 28px);
    max-width: 30ch;
    letter-spacing: -0.005em;
    /* Reserve enough vertical space for the worst-case 2-line
       countdown so that wraps over time don't reflow the H1. */
    min-height: calc(2.7em + clamp(20px, 2.6vh, 28px));
  }
  .h2::before {
    content: "";
    position: absolute;
    top: 0;
    left: 50%;
    width: 0;
    height: 1px;
    background: rgba(255,255,255,0.22);
    transform: translateX(-50%);
    transition: width 900ms cubic-bezier(0.22, 1, 0.36, 1);
  }
  .h2.h2-line-active::before { width: 80%; }

  .h2 .countdown-num {
    font-weight: 500;
    color: #fff;
    font-variant-numeric: tabular-nums;
  }
  .h2 .countdown-sep {
    color: rgba(255,255,255,0.4);
    margin: 0 0.35em;
  }

  /* ─── TYPEWRITER ────────────────────────────────────────── */
  .tw-char { opacity: 1; }
  .tw-char.tw-hidden { opacity: 0; }
  /* Cursor occupies zero inline width — visual is drawn by ::before
     positioned absolutely. This keeps layout stable as the cursor
     moves between H1 lines and the H2 (no character reflow). */
  .tw-cursor {
    display: inline-block;
    width: 0;
    height: 0;
    position: relative;
    overflow: visible;
  }
  .tw-cursor::before {
    content: "";
    position: absolute;
    left: 0.04em;
    bottom: 0;
    width: 0.05em;
    height: 0.85em;
    background: currentColor;
    border-radius: 1px;
    opacity: 0.9;
    animation: tw-blink 0.95s steps(2, end) infinite;
  }
  .tw-cursor.tw-cursor-fade::before {
    animation: none;
    opacity: 0;
    transition: opacity 280ms ease;
  }
  @keyframes tw-blink {
    50% { opacity: 0; }
  }

  /* Bottom — contact strip */
  .footer {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: end;
    gap: clamp(24px, 3vw, 48px);
    padding-top: clamp(24px, 3vh, 36px);
    border-top: 1px solid rgba(255,255,255,0.18);
  }
  .contact {
    font-family: var(--font-body);
    font-size: clamp(13px, 1.05vw, 15px);
    line-height: 1.6;
    color: rgba(255,255,255,0.75);
  }
  .contact .lab {
    display: block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-bottom: 6px;
  }
  .contact a {
    color: #fff;
    text-decoration: none;
    border-bottom: 1px solid rgba(255,255,255,0.25);
    transition: border-color 180ms ease, color 180ms ease;
  }
  .contact a:hover {
    border-bottom-color: var(--path-coral-bright);
    color: var(--path-coral-bright);
  }
  .contact .sep {
    color: rgba(255,255,255,0.3);
    margin: 0 0.6em;
  }

  .actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 20px;
    border: 1px solid rgba(255,255,255,0.45);
    border-radius: 999px;
    font-family: var(--font-body);
    font-weight: 500;
    font-size: 13px;
    letter-spacing: 0.02em;
    color: #fff;
    text-decoration: none;
    background: transparent;
    transition: background 220ms ease, color 220ms ease, border-color 220ms ease, transform 220ms ease;
    white-space: nowrap;
  }
  .btn:hover {
    background: #fff;
    color: var(--path-purple);
    border-color: #fff;
    transform: translateY(-1px);
  }
  .btn .arrow {
    font-size: 14px;
    line-height: 1;
    transition: transform 220ms ease;
  }
  .btn:hover .arrow { transform: translateX(2px); }

  /* ─── RESPONSIVE ───────────────────────────────────────── */
  @media (max-width: 720px) {
    .frame {
      gap: 24px;
      padding: 24px 22px;
    }
    .h1 {
      font-size: clamp(48px, 14vw, 72px);
      max-width: 100%;
    }
    .h2 {
      font-size: 17px;
      max-width: 100%;
    }
    .footer {
      grid-template-columns: 1fr;
      gap: 20px;
      align-items: start;
    }
    .actions {
      justify-content: flex-start;
    }
    .btn {
      padding: 11px 16px;
      font-size: 12px;
    }
    .contact { font-size: 13px; }
  }

  /* ─── REDUCED MOTION ───────────────────────────────────── */
  @media (prefers-reduced-motion: reduce) {
    .btn, .btn .arrow, .contact a { transition: none !important; }
    .tw-char.tw-hidden { opacity: 1 !important; }
    .tw-cursor { display: none !important; }
    .h2::before { width: 80% !important; transition: none !important; }
  }
</style>
</head>

<script>
  (function () {
    var line1 = document.querySelector('.h1 .line-1');
    var line2 = document.querySelector('.h1 .line-2');
    var h2El  = document.getElementById('countdown');
    if (!line1 || !line2 || !h2El) return;

    var reduced = window.matchMedia &&
                  window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    // ─── COUNTDOWN ─────────────────────────────────────────
    var target = new Date(2026, 4, 4, 0, 0, 0).getTime();
    var dateLabel = 'Learn more Monday, May 4th, 2026.';
    var typingDone = false;

    function countdownHTML() {
      var diff = target - Date.now();
      if (diff <= 0) return dateLabel;

      var totalMin = Math.floor(diff / 60000);
      var days  = Math.floor(totalMin / (60 * 24));
      var hours = Math.floor((totalMin % (60 * 24)) / 60);
      var mins  = totalMin % 60;

      var parts = [];
      if (days > 0)  parts.push('<span class="countdown-num">' + days + '</span> ' + (days === 1 ? 'day' : 'days'));
      if (hours > 0 || days > 0) parts.push('<span class="countdown-num">' + hours + '</span> ' + (hours === 1 ? 'hr' : 'hrs'));
      parts.push('<span class="countdown-num">' + mins + '</span> ' + (mins === 1 ? 'min' : 'mins'));

      return 'Learn more in ' + parts.join('<span class="countdown-sep">&middot;</span>');
    }

    // ─── TYPEWRITER ────────────────────────────────────────
    // Wrap every text-node character in <span class="tw-char">
    // so we can reveal them one at a time. Recurses through inline
    // elements (e.g. <span class="crisis">) so styled runs preserve
    // their italic / color.
    function splitChars(root) {
      var chars = [];
      function walk(node) {
        if (node.nodeType === 3) {
          var text = node.textContent;
          if (!text) return;
          var frag = document.createDocumentFragment();
          for (var i = 0; i < text.length; i++) {
            var s = document.createElement('span');
            s.className = 'tw-char';
            s.textContent = text.charAt(i);
            if (text.charAt(i) === ' ') s.style.whiteSpace = 'pre';
            frag.appendChild(s);
            chars.push(s);
          }
          node.parentNode.replaceChild(frag, node);
        } else if (node.nodeType === 1) {
          var kids = Array.prototype.slice.call(node.childNodes);
          for (var k = 0; k < kids.length; k++) walk(kids[k]);
        }
      }
      walk(root);
      return chars;
    }

    var cursor = document.createElement('span');
    cursor.className = 'tw-cursor';
    cursor.setAttribute('aria-hidden', 'true');

    function placeCursorAfter(node) {
      var parent = node.parentNode;
      if (!parent) return;
      if (node.nextSibling) parent.insertBefore(cursor, node.nextSibling);
      else parent.appendChild(cursor);
    }

    function typeInto(targetEl, chars, perChar) {
      return new Promise(function (resolve) {
        if (!chars.length) { targetEl.appendChild(cursor); resolve(); return; }
        chars.forEach(function (c) { c.classList.add('tw-hidden'); });
        // Place cursor relative to the char's actual parent — chars
        // can live inside nested inline spans (e.g. .crisis), not
        // necessarily as direct children of targetEl.
        var firstParent = chars[0].parentNode;
        if (firstParent) firstParent.insertBefore(cursor, chars[0]);
        var i = 0;
        (function step() {
          if (i >= chars.length) { resolve(); return; }
          chars[i].classList.remove('tw-hidden');
          placeCursorAfter(chars[i]);
          i++;
          setTimeout(step, perChar);
        })();
      });
    }

    function wait(ms) {
      return new Promise(function (r) { setTimeout(r, ms); });
    }

    // Build the initial countdown HTML so we can split its chars
    h2El.innerHTML = countdownHTML();

    var chars1  = splitChars(line1);
    var chars2  = splitChars(line2);
    var charsH2 = splitChars(h2El);

    // Split line 2 at the boundary of the .crisis span so we can
    // type "It's a " then pause before "crisis."
    var crisisEl = line2.querySelector('.crisis');
    var crisisStart = chars2.length;
    for (var ci = 0; ci < chars2.length; ci++) {
      if (crisisEl && crisisEl.contains(chars2[ci])) { crisisStart = ci; break; }
    }
    var charsBeforeCrisis = chars2.slice(0, crisisStart);   // "It's a "
    var charsCrisisPeriod = chars2.slice(crisisStart);      // "crisis."

    // Hide everything pre-roll
    chars1.concat(chars2, charsH2).forEach(function (c) {
      c.classList.add('tw-hidden');
    });

    // Reduced-motion: skip animation, show everything immediately
    if (reduced) {
      chars1.concat(chars2, charsH2).forEach(function (c) {
        c.classList.remove('tw-hidden');
      });
      h2El.classList.add('h2-line-active');
      typingDone = true;
    } else {
      // Wait for fonts so the typewriter doesn't reflow mid-typing
      var fontsReady = (document.fonts && document.fonts.ready)
        ? document.fonts.ready
        : Promise.resolve();

      fontsReady.then(function () {
        return wait(360);
      }).then(function () {
        return typeInto(line1, chars1, 100);
      }).then(function () {
        // Long rhetorical pause: "Yes." …  "It's a crisis."
        return wait(1300);
      }).then(function () {
        return typeInto(line2, charsBeforeCrisis, 88);
      }).then(function () {
        // Pregnant pause before the word "crisis"
        return wait(620);
      }).then(function () {
        // Slower per-char on "crisis." for emphasis
        return typeInto(line2, charsCrisisPeriod, 115);
      }).then(function () {
        return wait(820);
      }).then(function () {
        h2El.classList.add('h2-line-active');
        return wait(340);
      }).then(function () {
        return typeInto(h2El, charsH2, 44);
      }).then(function () {
        typingDone = true;
        // Cursor stays blinking on the countdown — reads as "live".
      });
    }

    // ─── COUNTDOWN UPDATES ─────────────────────────────────
    // Once typing is done, replace the H2 contents in place each
    // minute. Re-append the cursor so it stays visible at the end.
    setInterval(function () {
      if (!typingDone) return;
      var html = countdownHTML();
      h2El.innerHTML = html;
      h2El.appendChild(cursor);
    }, 30000);
  })();
</script>
